version: 2
updates:
  # Watch the multi-stage Dockerfile base layers (deno, alpine, uv).
  # Each FROM is digest-pinned, so Dependabot opens a PR whenever the
  # content behind a moving tag (:bin, :latest, :python3.14-trixie) changes.
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: daily
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: docker
    groups:
      docker-base-images:
        patterns:
          - "*"

  # Keep the Actions used by the build/watch workflows current too.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
    groups:
      github-actions:
        patterns:
          - "*"
